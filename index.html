<style>

/* ===== GLOBAL ===== */
html, body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0e0e12;
    color:#f1f1f1;
    min-height:100dvh;
}

/* ===== CONTAINER ===== */
.container{
    max-width:600px;
    margin:60px auto;
    padding:30px;
}

/* ===== TITLE ===== */
h1{
    font-family:'Orbitron',sans-serif;
    font-size:24px;
    font-weight:600;
    margin-bottom:20px;
    color:#ffffff;
    letter-spacing:1px;
}
.size-control {
    display: flex;
    justify-content: center;   /* rata tengah horizontal */
    align-items: center;       /* rata tengah vertikal */
    gap: 12px;                 /* jarak antar tombol dan label */
    margin-top: 15px;
}

.size-btn {
    width:32px;
    height:32px;
    border:none;
    border-radius:50%;
    background: linear-gradient(135deg, #00ffff, #0088ff);
    color:#000;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow:0 3px 6px rgba(0,255,255,0.3);
}

.size-btn:hover {
    transform: scale(1.1);
    box-shadow:0 5px 12px rgba(0,255,255,0.5);
}

#sizeLabel {
    min-width:50px;
    text-align:center;
    font-size:16px;
    font-weight:500;
    color:#ffffff;
}
/* ===== INPUT ===== */
/* ===== TEXTAREA PRESISI ===== */
textarea{
    width:100%;
    height:120px;
    box-sizing:border-box;

    padding:14px 16px;
    border-radius:8px;
    border:1px solid #2a2a35;

    background:#15151c;
    color:#ffffff;

    font-size:16px;
    line-height:1.6;
    text-align:right;
    letter-spacing:0.2px;

    resize:none;
    outline:none;

    display:block;
    overflow-y:auto;

    transition:border-color 0.2s ease, background 0.2s ease;
}

textarea:focus{
    border-color:#4f46e5;
    background:#181822;
}
select{
    width:100%;
    margin-top:12px;
    padding:10px;
    border-radius:8px;
    background:#15151c;
    color:white;
    border:1px solid #2a2a35;
    transition:0.2s;
}

select:focus{
    border-color:#4f46e5;
}

/* ===== PREVIEW ===== */
.preview{
    margin-top:25px;
    padding:20px;
    border-radius:10px;
    background:#15151c;
    border:1px solid #2a2a35;
    font-size:20px;
    line-height:1.6;
    text-align:center;
    min-height:60px;
    transition:0.2s;
}

.preview.animateText{
    animation:fade 0.2s ease;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

/* ===== FOOTER ===== */
.footer{
    margin-top:40px;
    font-size:12px;
    opacity:0.4;
    text-align:center;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
    .container{
        margin:40px 20px;
        padding:20px;
    }
}
.neon-btn {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    font-weight: 600;
    color: #00ffff;
    background: transparent;
    border: 2px solid #00ffff;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.3s;
    box-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff;
}
.export-btn{
    width:100%;
    margin-top:20px;
}

.preview{
    margin-top:25px;
    padding:20px;
    border-radius:14px;
    background:rgba(21,21,28,0.85);
    backdrop-filter:blur(10px);
    border:1px solid #2a2a35;
    font-size:20px;
    line-height:1.6;
    min-height:80px;
    transition:0.2s;
    overflow-wrap:break-word;
    word-break:break-word;
}
.neon-btn:hover {
    color: #000;
    background: #00ffff;
    box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
    transform: scale(1.05);
}
.preview .line{
    width:100%;
    margin:0;
}

.preview .justify-line{
    display:flex;
    justify-content:space-between;
    width:100%;
}

.preview .normal-line{
    text-align:inherit;
}

<body>

<div class="container">

<h1>AFHIMNA CYBER</h1>

<textarea id="inputText" placeholder="Tulis teks di sini..."></textarea>

<select id="fontSelector">
<option value="'Amiri',serif">Amiri</option>
<option value="'Scheherazade New',serif">Scheherazade</option>
<option value="'Lateef',cursive">Lateef</option>
<option value="'Aref Ruqaa',serif">Aref Ruqaa</option>
<option value="'Noto Nastaliq Urdu',serif">Nastaliq</option>
<option value="DecoThuluth">Deco Thuluth</option>
<option value="DecoNaskh">Deco Naskh</option>
<option value="BArabics">BArabics</option>
<option value="Abomsaab">Abomsaab</option>
</select>

<select id="colorSelector">
<option value="#00ffff">Cyber Cyan</option>
<option value="#00ff88">Neon Green</option>
<option value="#ff00ff">Neon Pink</option>
<option value="#ffcc00">Golden Glow</option>
<option value="#ff4444">Laser Red</option>
<option value="#ffffff">Pure White</option>
<option value="#a855f7">Electric Purple</option>
<option value="#38bdf8">Sky Blue</option>
<option value="#f97316">Orange Flame</option>
<option value="#10b981">Emerald</option>
</select>

<select id="alignSelector">
    <option value="right">Rata Kanan</option>
    <option value="left">Rata Kiri</option>
    <option value="center" selected>Rata Tengah</option>
    <option value="justify">Rata Penuh (Smart)</option>
</select>

<select id="lineHeightSelector">
    <option value="0.5">Jarak Baris 0.5</option>
    <option value="0.6">Jarak Baris 0.6</option>
    <option value="0.7">Jarak Baris 0.7</option>
    <option value="0.8">Jarak Baris 0.8</option>
    <option value="0.9">Jarak Baris 0.9</option>
    <option value="1">Jarak Baris 1.0</option>
    <option value="1.2">Jarak Baris 1.2</option>
    <option value="1.4">Jarak Baris 1.4</option>
    <option value="1.6" selected>Jarak Baris 1.6</option>
    <option value="1.8">Jarak Baris 1.8</option>
    <option value="2">Jarak Baris 2.0</option>
    <option value="2.5">Jarak Baris 2.5</option>
    <option value="3">Jarak Baris 3.0</option>
</select>

<br>
<div class="size-control">
  <button class="size-btn" onclick="changeSize(-1)">-</button>
  <span id="sizeLabel">20 px</span>
  <button class="size-btn" onclick="changeSize(1)">+</button>
</div>
<div class="preview" id="previewText">
Preview teks akan muncul di sini
</div>

<button class="neon-btn export-btn" onclick="exportText()">
💾 Ekspor Hasil (Transparan)
</button>

<div class="footer">
© 2025 Afhimna Dev. All Rights Reserved.
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
let fontSize = 20;

const inputText = document.getElementById("inputText");
const previewText = document.getElementById("previewText");
const fontSelector = document.getElementById("fontSelector");
const colorSelector = document.getElementById("colorSelector");
const alignSelector = document.getElementById("alignSelector");
const lineHeightSelector = document.getElementById("lineHeightSelector");
const sizeLabel = document.getElementById("sizeLabel");

inputText.addEventListener("input", updatePreview);
fontSelector.addEventListener("change", updatePreview);
colorSelector.addEventListener("change", updatePreview);
alignSelector.addEventListener("change", updatePreview);
lineHeightSelector.addEventListener("change", updatePreview);

function updatePreview(){
    const text = inputText.value;
    const lines = text.split("\n");
    
    previewText.innerHTML = "";
    previewText.style.fontFamily = fontSelector.value;
    previewText.style.color = colorSelector.value;
    previewText.style.textAlign = alignSelector.value;
    
    const arabicRegex = /[\u0600-\u06FF]/;
const selectedLineHeight = lineHeightSelector.value;

if(arabicRegex.test(inputText.value)){
    previewText.dir = "rtl";
}else{
    previewText.dir = "ltr";
}

previewText.style.lineHeight = selectedLineHeight;
    
    lines.forEach((line,index)=>{

    const div = document.createElement("div");
    div.classList.add("line");

    // Jika bukan mode justify
    if(alignSelector.value !== "justify"){
        div.classList.add("normal-line");
        div.textContent = line;
        previewText.appendChild(div);
        return;
    }

    // Baris terakhir tidak di-justify
    if(index === lines.length-1){
        div.classList.add("normal-line");
        div.textContent = line;
        previewText.appendChild(div);
        return;
    }

    // Pecah menjadi kata-kata
    const words = line.trim().split(/\s+/);

    // Kalau cuma satu kata tidak perlu justify
    if(words.length <= 1){
        div.classList.add("normal-line");
        div.textContent = line;
        previewText.appendChild(div);
        return;
    }

    div.classList.add("justify-line");
    words.forEach(word=>{
        const span=document.createElement("span");
        span.textContent=word;
        div.appendChild(span);

    });
    previewText.appendChild(div);

});

    previewText.classList.remove("animateText");
    void previewText.offsetWidth;
    previewText.classList.add("animateText");
}

function changeSize(value){
    fontSize += value;
    if(fontSize<10) fontSize=10;
    if(fontSize>150) fontSize=150;
    previewText.style.fontSize=fontSize+"px";
    sizeLabel.textContent=fontSize+" px";
}
// Prevent zoom double tap iOS
document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});

// Improve performance mobile
window.addEventListener("resize", () => {
    previewText.style.fontSize = fontSize + "px";
});

function drawJustifiedLine(ctx, line, y, padding, maxWidth, isArabic){

    const words = line.trim().split(/\s+/);

    if(words.length <= 1){
        if(isArabic){
            ctx.textAlign="right";
            ctx.fillText(line, maxWidth + padding, y);
        }else{
            ctx.textAlign="left";
            ctx.fillText(line, padding, y);
        }
        return;
    }

    const wordWidths = words.map(w => ctx.measureText(w).width);

    const totalWordsWidth = wordWidths.reduce((a,b)=>a+b,0);

    const availableWidth = maxWidth;

    const gap = (availableWidth-totalWordsWidth)/(words.length-1);

    if(isArabic){

        let x = padding + availableWidth;

        for(let i=0;i<words.length;i++){

            ctx.textAlign="right";
            ctx.fillText(words[i],x,y);

            x -= wordWidths[i] + gap;
        }

    }else{

        let x = padding;

        for(let i=0;i<words.length;i++){

            ctx.textAlign="left";
            ctx.fillText(words[i],x,y);

            x += wordWidths[i] + gap;
        }

    }

}
async function exportText() {
    const text = inputText.value;
    if (!text.trim()) return;

    await document.fonts.ready;

    const font = fontSelector.value;
    const color = colorSelector.value;
    const align = alignSelector.value;
    const lineHeight = parseFloat(lineHeightSelector.value);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const scale = 10;
    const lines = text.split("\n");

    ctx.font = fontSize + "px " + font;

    let maxWidth = 0;
    let totalHeight = 0;

    const metricsData = lines.map(line => {

        const metrics = ctx.measureText(line);

        const ascent = metrics.actualBoundingBoxAscent || fontSize * 1.5;
        const descent = metrics.actualBoundingBoxDescent || fontSize * 0.8;
        const height = ascent + descent;

        maxWidth = Math.max(maxWidth, metrics.width);

        totalHeight += height * lineHeight;

        return {
            line,
            width: metrics.width,
            ascent,
            descent,
            height
        };

    });

    const padding = fontSize * 1.15;

    canvas.width = (maxWidth + padding * 2) * scale;
    canvas.height = (totalHeight + padding * 2) * scale;

    ctx.scale(scale, scale);

    ctx.font = fontSize + "px " + font;
    ctx.fillStyle = color;
    ctx.textBaseline = "alphabetic";

    const arabicRegex = /[\u0600-\u06FF]/;
    const isArabic = arabicRegex.test(text);

    ctx.direction = isArabic ? "rtl" : "ltr";

    let y = padding;

    metricsData.forEach((item, index) => {

    y += item.ascent;

    let x;

    switch (align) {

        case "left":
            ctx.textAlign = "left";
            x = padding;
            break;

        case "center":
            ctx.textAlign = "center";
            x = canvas.width / scale / 2;
            break;

        case "right":
            ctx.textAlign = "right";
            x = canvas.width / scale - padding;
            break;

        case "justify":
            ctx.textAlign = isArabic ? "right" : "left";
            x = isArabic
                ? canvas.width / scale - padding
                : padding;
            break;

        default:
            ctx.textAlign = isArabic ? "right" : "left";
            x = isArabic
                ? canvas.width / scale - padding
                : padding;
    }

    // =========================
    // MODE BIASA
    // =========================
    if (align !== "justify") {

        ctx.fillText(item.line, x, y);

    }

    // MODE JUSTIFY
else{

    if(index === metricsData.length-1){

        ctx.fillText(item.line,x,y);

    }else{

        drawJustifiedLine(
            ctx,
            item.line,
            y,
            padding,
            maxWidth,
            isArabic
        );

    }

}

    y += (item.height * lineHeight) - item.ascent;

});

const link = document.createElement("a");
link.download = "Story.png";
link.href = canvas.toDataURL("image/png");
link.click();
}
</script>

</body>
